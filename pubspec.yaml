name: dart_ass
description: Advanced ASS Subtitle Reader & Editor for Dart
version: 1.0.6
repository: https://github.com/klsruan/dart_ass

environment:
  sdk: ^3.4.3
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  path: ^1.9.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.24.0
  ffigen: ^10.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true

ffigen:
  output: 'lib/freetype/src/generated_bindings.dart'
  name: 'FreetypeBinding'
  description: 'Freetype binding for dart'

  llvm-path:
    - 'C:\Program Files\LLVM'

  headers:
    entry-points:
      - 'wrapper.h'

    include-directives:
      - 'freetype/include/freetype/**'

  compiler-opts:
    - '-Ifreetype/include'
